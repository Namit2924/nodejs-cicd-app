version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install

  build:
    commands:
      - echo Triggering deployment on EC2 via SSM...
      - aws ssm send-command \
        --document-name "AWS-RunShellScript" \
        --targets "Key=instanceids,Values=<YOUR-EC2-ID>" \
        --parameters commands="cd /home/ec2-user/app || mkdir -p /home/ec2-user/app,cd /home/ec2-user/app,git clone <YOUR-GITHUB-REPO> . || git pull,npm install,pkill node || true,nohup node app.js > output.log 2>&1 &" \
        --region ap-south-1